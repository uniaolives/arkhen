version: '3.8'

services:
  webhooks:
    build:
      context: ..
      dockerfile: tim_vm/Dockerfile
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      - ENV=production
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ../models:/app/models
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=metalflow
      - POSTGRES_USER=metalflow
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  monitoring:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data:
