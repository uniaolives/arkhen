
version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: arkheflow
      POSTGRES_USER: arkhe
      POSTGRES_PASSWORD: arkhe
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://arkhe:arkhe@postgres:5432/arkheflow
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

volumes:
  pgdata:
