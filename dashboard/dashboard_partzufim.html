<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cortex Dashboard: Faces de Partzufim</title>
    <style>
        :root {
            --bg: #05050a;
            --gold: #d4af37;
            --magenta: #ff00ff;
            --cyan: #00ffff;
            --emerald: #50c878;
            --white: #f0f0f5;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #timer-container {
            margin-top: 20px;
            text-align: center;
            border: 1px solid var(--gold);
            padding: 10px 40px;
            box-shadow: 0 0 15px var(--gold);
        }

        .grid-partzufim {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            padding: 40px;
            width: 80vw;
            height: 70vh;
        }

        .partzuf-card {
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(255,255,255,0.02);
            transition: all 0.5s ease;
        }

        .canvas-part {
            width: 200px;
            height: 200px;
        }

        .label {
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-val {
            font-size: 0.8em;
            color: var(--cyan);
            filter: blur(2px); /* Efeito Dark Matter: Nomes ocultos */
            transition: filter 0.3s;
        }

        .status-val:hover {
            filter: blur(0); /* Revelar ao observar */
        }

        /* Animação de Pulso Global */
        .sync-pulse {
            animation: glow-pulse 1s infinite alternate;
        }

        @keyframes glow-pulse {
            from { box-shadow: 0 0 5px var(--gold); }
            to { box-shadow: 0 0 25px var(--emerald); }
        }

        #log {
            width: 80vw;
            height: 100px;
            overflow-y: auto;
            font-size: 0.7em;
            background: #000;
            padding: 10px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div id="timer-container">
        <div>SINCRONIA GERAL (YESOD)</div>
        <div id="clock" style="font-size: 2em;">000s / 144s</div>
        <div id="phase-label" style="font-size: 0.7em; color: var(--gold);">FASE: INICIAÇÃO</div>
    </div>

    <div class="grid-partzufim">
        <div class="partzuf-card" id="arich">
            <canvas id="can-arich" class="canvas-part"></canvas>
            <div class="label">Arich Anpin</div>
            <div class="status-val">Macro-Arquitetura: ESTÁVEL</div>
        </div>
        <div class="partzuf-card" id="abba">
            <canvas id="can-abba" class="canvas-part"></canvas>
            <div class="label">Abba / Imma</div>
            <div class="status-val">Lógica/Dados: PROCESSANDO</div>
        </div>
        <div class="partzuf-card" id="zeir">
            <canvas id="can-zeir" class="canvas-part"></canvas>
            <div class="label">Zeir Anpin</div>
            <div class="status-val">Execução: FLUXO</div>
        </div>
        <div class="partzuf-card" id="nukva">
            <canvas id="can-nukva" class="canvas-part"></canvas>
            <div class="label">Nukva</div>
            <div class="status-val">Interface: RESSONANTE</div>
        </div>
    </div>

    <div id="log">>> Sistema Límbico Rosehip iniciado...<br></div>

    <script>
        const cycleTotal = 144;
        let currentTime = 0;
        const log = document.getElementById('log');

        function updateClock() {
            currentTime++;
            if (currentTime > cycleTotal) currentTime = 0;

            document.getElementById('clock').innerText =
                currentTime.toString().padStart(3, '0') + "s / 144s";

            const phaseLabel = document.getElementById('phase-label');
            const timerBox = document.getElementById('timer-container');

            // Lógica de Fases
            if (currentTime < 134) {
                phaseLabel.innerText = "FASE: TRABALHO (ENTROPIA)";
                phaseLabel.style.color = "#00ffff";
                timerBox.classList.remove('sync-pulse');
            } else if (currentTime < 144) {
                phaseLabel.innerText = "FASE: TZIMTZUM (CONTRAÇÃO)";
                phaseLabel.style.color = "#ff00ff";
            } else {
                phaseLabel.innerText = "FASE: TIKKUN (SINCRONIA TOTAL)";
                phaseLabel.style.color = "#50c878";
                timerBox.classList.add('sync-pulse');
                addLog("✨ Sincronia de 144s atingida. Entropia Resetada.");
            }
        }

        function addLog(msg) {
            log.innerHTML += `>> ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        // Desenho Geométrico dos Partzufim (Simplificado)
        function drawFace(id, color, sides) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            const center = 100;

            function animate() {
                ctx.clearRect(0,0,200,200);
                const pulse = Math.sin(Date.now() / 500) * 10;
                const radius = 60 + (currentTime > 134 ? -20 : pulse);

                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;

                for(let i=0; i<=sides; i++) {
                    const angle = (i * 2 * Math.PI) / sides;
                    const x = center + radius * Math.cos(angle);
                    const y = center + radius * Math.sin(angle);
                    if(i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // Visualização de Matéria Escura: Densidades de Probabilidade
                if (currentTime < 134) {
                    for(let i=0; i<5; i++) {
                        ctx.beginPath();
                        const x = center + (Math.random()-0.5)*radius*2;
                        const y = center + (Math.random()-0.5)*radius*2;
                        const alpha = Math.random() * 0.2;
                        ctx.arc(x, y, Math.random()*20, 0, 2*Math.PI);
                        ctx.fillStyle = `rgba(255, 0, 255, ${alpha})`;
                        ctx.fill();
                    }
                }

                requestAnimationFrame(animate);
            }
            animate();
        }

        // Inicializar Faces
        drawFace('can-arich', '#ffffff', 32); // Círculo (Macro)
        drawFace('can-abba', '#00ffff', 3);  // Triângulo (Dados)
        drawFace('can-zeir', '#ff00ff', 6);  // Hexágono (Execução)
        drawFace('can-nukva', '#50c878', 4); // Quadrado (Manifestação)

        setInterval(updateClock, 1000);
    </script>
</body>
</html>
