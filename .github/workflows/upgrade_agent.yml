# .github/workflows/upgrade_agent.yml
name: Upgrade Agent Workflow
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  topological_diagnosis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          python scripts/setup_gdl_environment.py

      - name: Run Topological Analysis (GNN-Inference)
        run: |
          # O agente carrega o grafo do projeto
          python -m agent.gnn_analyzer \
            --repo-path ${{ github.workspace }} \
            --output-diagnosis ./artifacts/topology_report.json

      - name: Upgrade tim_vm.c if Needed
        if: steps.topological_diagnosis.outputs.diagnosis == "BOTTLENECK_DETECTED"
        run: |
          # O agente decide recompilar o núcleo de tempo
          gcc -O3 src/tim_vm.c -o bin/tim_vm_x86

      - name: Run Tests with Precision Timing
        run: |
          # Usa o novo tim_vm para medir a execução com precisão nanosegundo
          bin/tim_vm_x86 ./run_tests.sh --precision-nanosecond
