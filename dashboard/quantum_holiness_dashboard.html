
<!DOCTYPE html>
<html>
<head>
    <title>🌌 Quantum Holiness Dashboard</title>
    <meta charset="utf-8">
    <style>
        body { background: #0a0a1a; color: #e0e0ff; font-family: 'Courier New', monospace; padding: 20px; }
        .metric-card { background: rgba(20, 20, 40, 0.8); border: 1px solid #333366; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .metric-value { font-size: 2.5em; color: #4a4aff; }
        .stream-container { background: black; border: 2px solid #4a4aff; height: 300px; overflow-y: auto; padding: 10px; }
        .holiness-badge { background: linear-gradient(45deg, #4a4aff, #ff4a4a); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🌌 QUANTUM HOLINESS DASHBOARD</h1>
    <div class="metric-card">
        <h3>🌊 Coerência Global</h3>
        <div id="coherence" class="metric-value">0.000</div>
    </div>
    <div class="stream-container" id="events">
        <div class="quantum-event">[*] Aguardando pulso quântico...</div>
    </div>
    <script>
        const eventSource = new EventSource('http://localhost:8888/resonate');
        const eventsContainer = document.getElementById('events');
        const coherenceDisplay = document.getElementById('coherence');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            coherenceDisplay.textContent = data.global_coherence.toFixed(4);

            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] Fluxo: ${data.quantum_flux.toFixed(4)} | Partículas: ${data.active_particles}`;
            eventsContainer.prepend(div);
            if (eventsContainer.children.length > 50) eventsContainer.removeChild(eventsContainer.lastChild);
        };
    </script>
</body>
</html>
