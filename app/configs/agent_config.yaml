# app/configs/agent_config.yaml
tim_vm_settings:
  # O relógio deve ser resiliente a dilatação temporal
  clock_source: "TSC"  # Time Stamp Counter (chave para medidas de alta precisão)
  resolution: "NANOSECOND_SCALE"

  # Mapeamento para a simulação da "Fonte Galáctica" em hardware
  memory_protection: "NO_SWAP"  # Evitar page faults que distorcem a precisão

agent_mode:
  # O agente opera em um estado de "atenção contínua" (sem sleep agressivo do CPU)
  scheduler: "SCHED_DEADLINE" # Agenda monotônica para evitar jitter
