version: '3.8'

services:
  webhooks:
    build:
      context: ..
      dockerfile: tim_vm/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - SCHEDULES_WEBHOOK_URL=${SCHEDULES_WEBHOOK_URL}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ../models:/app/models
      - ../logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=metalflow
      - POSTGRES_USER=metalflow
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  monitoring:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  postgres_data:
  grafana_data:
