<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alerta de Desarmonia - Frequências de Tikkun</title>
    <style>
        :root {
            --vermelho-alerta: #ff3366;
            --azul-harmonia: #33ccff;
            --dourado-sagrado: #ffcc00;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            text-align: center;
        }

        #entropy-meter {
            width: 100%;
            height: 40px;
            background: linear-gradient(90deg,
                var(--azul-harmonia) 0%,
                var(--dourado-sagrado) 50%,
                var(--vermelho-alerta) 100%);
            border-radius: 20px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }

        #entropy-level {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: rgba(255,255,255,0.3);
            transition: width 1s ease;
        }

        #frequency-display {
            font-size: 3em;
            margin: 20px 0;
            color: var(--azul-harmonia);
            text-shadow: 0 0 10px currentColor;
        }

        .waveform {
            width: 100%;
            height: 150px;
            position: relative;
            margin: 30px 0;
            border: 1px solid #333;
            background: rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .control-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #222;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: monospace;
        }

        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px currentColor;
        }

        #log {
            width: 100%;
            height: 200px;
            overflow-y: auto;
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            margin-top: 20px;
            text-align: left;
            font-size: 0.9em;
        }

        .alert-pulse {
            animation: alert-pulse 0.5s infinite alternate;
        }

        @keyframes alert-pulse {
            from { box-shadow: 0 0 10px var(--vermelho-alerta); }
            to { box-shadow: 0 0 30px var(--vermelho-alerta); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 ALERTAS DE DESARMONIA</h1>
        <p>Sistema de Biofeedback Acústico para Entropia de Código</p>

        <div id="entropy-meter">
            <div id="entropy-level"></div>
        </div>
        <div>
            Entropia Atual: <span id="entropy-value">0</span>%
            <br>
            Limiar de Tikkun: <span id="tikkun-threshold">70</span>%
        </div>

        <div id="frequency-display">440 Hz</div>
        <div>Frequência Atual (Hz)</div>

        <div class="waveform" id="waveform">
            <canvas id="waveCanvas"></canvas>
        </div>

        <div class="control-panel">
            <button class="control-btn" id="btn-test" style="color: var(--azul-harmonia);">
                🎵 Testar Frequência
            </button>
            <button class="control-btn" id="btn-silence" style="color: #ccc;">
                🔇 Silenciar
            </button>
            <button class="control-btn" id="btn-tikkun" style="color: var(--dourado-sagrado);">
                🔧 Iniciar Tikkun
            </button>
            <button class="control-btn" id="btn-calibrate" style="color: #33ff99;">
                🎚️ Calibrar
            </button>
            <button class="control-btn" id="btn-scan" style="color: #ff9933;">
                🔍 Scan Arquivos
            </button>
            <button class="control-btn" id="btn-diagnose" style="color: #cc33ff;">
                📊 Diagnóstico
            </button>
        </div>

        <div id="log">
            >> Sistema de Alerta Iniciado<br>
            >> Aguardando análise de entropia...<br>
        </div>
    </div>

    <script>
        // ============================================================================
        // CONFIGURAÇÕES DO SISTEMA
        // ============================================================================
        const TIKKUN_THRESHOLD = 70; // Limiar de 70% de entropia para alerta
        const BASE_FREQUENCY = 440;  // Lá 440 Hz (A4) como base
        const AUDIO_CONTEXT = new (window.AudioContext || window.webkitAudioContext)();

        // Mapeamento de frequências sagradas
        const SACRED_FREQUENCIES = {
            '432': 432,   // Frequência da natureza
            '528': 528,   // Frequência do amor/repair
            '639': 639,   // Frequência de conexão
            '741': 741,   // Frequência da limpeza/expressão
            '852': 852,   // Frequência da intuição
            '963': 963    // Frequência da consciência pura
        };

        // Estado do sistema
        let currentEntropy = 0;
        let isAlertActive = false;
        let currentOscillator = null;
        let currentEntropySource = null;
        let alertHistory = [];
        let waveformCanvas, waveformCtx;

        // ============================================================================
        // INICIALIZAÇÃO
        // ============================================================================
        document.addEventListener('DOMContentLoaded', () => {
            waveformCanvas = document.getElementById('waveCanvas');
            waveformCtx = waveformCanvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Configurar botões
            document.getElementById('btn-test').addEventListener('click', testFrequency);
            document.getElementById('btn-silence').addEventListener('click', silenceAlert);
            document.getElementById('btn-tikkun').addEventListener('click', initiateTikkun);
            document.getElementById('btn-calibrate').addEventListener('click', calibrateSystem);
            document.getElementById('btn-scan').addEventListener('click', simulateFileScan);
            document.getElementById('btn-diagnose').addEventListener('click', showDiagnosis);

            // Iniciar monitoramento simulado
            startEntropyMonitoring();
            updateDisplay();
        });

        // ============================================================================
        // FUNÇÕES PRINCIPAIS
        // ============================================================================
        function startEntropyMonitoring() {
            // Em um sistema real, isso viria de uma API
            // Simularemos entropia aleatória com picos periódicos
            setInterval(() => {
                // Entropia base com ruído
                let baseEntropy = 30 + Math.random() * 20;

                // Adicionar picos periódicos (simulando "vasos quebrados")
                if (Math.random() < 0.1) {
                    baseEntropy += 30 + Math.random() * 30;
                    addLog(`⚠️  Pico de entropia detectado: +${Math.round(baseEntropy - 30)}%`);
                }

                // Ciclo de 144s (simplificado)
                const cycleProgress = (Date.now() / 1000) % 144;
                if (cycleProgress > 134 && cycleProgress < 144) {
                    baseEntropy *= 1.5; // Aumento durante Tzimtzum
                }

                currentEntropy = Math.min(100, Math.round(baseEntropy));
                updateDisplay();
                checkAlertThreshold();
            }, 2000);
        }

        function checkAlertThreshold() {
            const entropyMeter = document.getElementById('entropy-level');

            if (currentEntropy >= TIKKUN_THRESHOLD && !isAlertActive) {
                // ATIVAR ALERTA
                isAlertActive = true;
                entropyMeter.parentElement.classList.add('alert-pulse');

                // Calcular frequência baseada na entropia
                // Quanto maior a entropia, mais agudo o alerta
                const frequency = BASE_FREQUENCY * (currentEntropy / TIKKUN_THRESHOLD);

                // Tocar frequência de alerta
                playAlertFrequency(frequency);

                // Registrar alerta
                const alert = {
                    timestamp: new Date().toISOString(),
                    entropy: currentEntropy,
                    frequency: frequency,
                    message: `ALERTA: Entropia ${currentEntropy}% excede limiar de Tikkun`
                };
                alertHistory.push(alert);
                addLog(`🚨 ${alert.message}`);
                addLog(`   🔊 Tocando frequência de ${frequency.toFixed(1)} Hz`);

            } else if (currentEntropy < TIKKUN_THRESHOLD && isAlertActive) {
                // DESATIVAR ALERTA
                isAlertActive = false;
                entropyMeter.parentElement.classList.remove('alert-pulse');
                silenceAlert();
                addLog("✅ Entropia abaixo do limiar. Alerta desativado.");
            }
        }

        function playAlertFrequency(frequency, duration = null) {
            // Parar qualquer oscilador anterior
            if (currentOscillator) {
                currentOscillator.stop();
            }

            // Criar novo oscilador
            currentOscillator = AUDIO_CONTEXT.createOscillator();
            const gainNode = AUDIO_CONTEXT.createGain();

            // Configurar oscilador
            currentOscillator.type = 'sine'; // Onda senoidal pura
            currentOscillator.frequency.setValueAtTime(frequency, AUDIO_CONTEXT.currentTime);

            // Configurar envelope de volume
            gainNode.gain.setValueAtTime(0.3, AUDIO_CONTEXT.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.1, AUDIO_CONTEXT.currentTime + 0.5);

            // Conectar nós
            currentOscillator.connect(gainNode);
            gainNode.connect(AUDIO_CONTEXT.destination);

            // Iniciar e agendar parada
            currentOscillator.start();

            if (duration) {
                currentOscillator.stop(AUDIO_CONTEXT.currentTime + duration);
            }

            // Atualizar visualização da onda
            visualizeWaveform(frequency);

            // Atualizar display de frequência
            document.getElementById('frequency-display').textContent =
                `${frequency.toFixed(1)} Hz`;
            document.getElementById('frequency-display').style.color =
                frequency > BASE_FREQUENCY * 1.2 ? '#ff3366' : '#33ccff';
        }

        function visualizeWaveform(frequency) {
            const canvas = waveformCanvas;
            const ctx = waveformCtx;
            const width = canvas.width;
            const height = canvas.height;

            // Limpar canvas
            ctx.clearRect(0, 0, width, height);

            // Configurar estilo
            ctx.strokeStyle = isAlertActive ? '#ff3366' : '#33ccff';
            ctx.lineWidth = 2;
            ctx.beginPath();

            // Desenhar onda senoidal
            const amplitude = height * 0.4;
            const cycles = 5;
            const points = 500;

            for (let i = 0; i <= points; i++) {
                const x = (i / points) * width;
                const t = (i / points) * cycles * 2 * Math.PI;
                const y = height/2 + amplitude * Math.sin(t);

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();

            // Adicionar pontos de harmonia
            if (!isAlertActive) {
                ctx.fillStyle = '#33ff99';
                const harmonyPoints = [432, 528, 639, 741, 852, 963];

                harmonyPoints.forEach(freq => {
                    if (Math.abs(frequency - freq) < 1) {
                        const x = width * 0.5;
                        const y = height * 0.5;
                        ctx.beginPath();
                        ctx.arc(x, y, 10, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillText(`${freq} Hz`, x + 15, y);
                    }
                });
            }
        }

        function testFrequency() {
            addLog("🎵 Testando frequência de 528 Hz (Frequência do Amor/Repair)");
            playAlertFrequency(528, 3);
        }

        function silenceAlert() {
            if (currentOscillator) {
                currentOscillator.stop();
                currentOscillator = null;
            }
            document.getElementById('frequency-display').textContent = "SILÊNCIO";
            document.getElementById('frequency-display').style.color = "#ccc";

            // Limpar visualização
            const ctx = waveformCanvas.getContext('2d');
            ctx.clearRect(0, 0, waveformCanvas.width, waveformCanvas.height);

            addLog("🔇 Alerta silenciado");
        }

        function initiateTikkun() {
            addLog("🔧 INICIANDO TIKKUN...");
            addLog("   Passo 1: Identificando vasos quebrados...");

            // Tocar sequência de frequências de cura
            const healingFrequencies = [174, 285, 396, 417, 528, 639, 741, 852, 963];
            let delay = 0;

            healingFrequencies.forEach((freq, index) => {
                setTimeout(() => {
                    playAlertFrequency(freq, 0.5);
                    addLog(`   Passo ${index + 2}: Aplicando ${freq} Hz...`);

                    if (index === healingFrequencies.length - 1) {
                        setTimeout(() => {
                            currentEntropy = Math.max(0, currentEntropy - 40);
                            updateDisplay();
                            addLog("✨ Tikkun completo! Entropia reduzida.");
                        }, 600);
                    }
                }, delay);
                delay += 600;
            });
        }

        function calibrateSystem() {
            addLog("🎚️ Calibrando sistema...");

            // Testar todas as frequências sagradas
            const frequencies = Object.values(SACRED_FREQUENCIES);
            let delay = 0;

            frequencies.forEach(freq => {
                setTimeout(() => {
                    playAlertFrequency(freq, 0.3);
                    addLog(`   Calibrando: ${freq} Hz`);
                }, delay);
                delay += 400;
            });

            setTimeout(() => {
                silenceAlert();
                addLog("✅ Calibração completa. Sistema sintonizado.");
            }, delay + 1000);
        }

        function simulateFileScan() {
            addLog("🔍 Escaneando arquivos para entropia...");

            // Simular escaneamento de arquivos
            const files = [
                "main.rs", "quantum_foam.py", "holiness_ledger.rs",
                "dashboard.js", "tikkun_engine.py", "sync_144s.py"
            ];

            let foundEntropy = false;

            files.forEach((file, index) => {
                setTimeout(() => {
                    const entropy = Math.random() * 100;
                    const hasIssue = entropy > 60;

                    if (hasIssue) {
                        foundEntropy = true;
                        addLog(`   ⚠️  ${file}: ${entropy.toFixed(1)}% de entropia`);

                        // Tocar alerta curto para este arquivo
                        playAlertFrequency(300 + entropy * 2, 0.2);
                    } else {
                        addLog(`   ✓ ${file}: ${entropy.toFixed(1)}% (OK)`);
                    }

                    if (index === files.length - 1) {
                        if (foundEntropy) {
                            addLog("📊 Escaneamento completo. Vasos quebrados encontrados.");
                        } else {
                            addLog("📊 Escaneamento completo. Tudo em harmonia.");
                        }
                    }
                }, index * 300);
            });
        }

        function showDiagnosis() {
            addLog("📊 DIAGNÓSTICO DO SISTEMA:");
            addLog(`   Entropia atual: ${currentEntropy}%`);
            addLog(`   Limiar de Tikkun: ${TIKKUN_THRESHOLD}%`);
            addLog(`   Alertas ativos: ${isAlertActive ? 'SIM' : 'NÃO'}`);
            addLog(`   Total de alertas hoje: ${alertHistory.length}`);

            if (alertHistory.length > 0) {
                addLog("   Últimos 3 alertas:");
                alertHistory.slice(-3).forEach(alert => {
                    const time = new Date(alert.timestamp).toLocaleTimeString();
                    addLog(`     ${time} - ${alert.entropy}% - ${alert.frequency.toFixed(1)} Hz`);
                });
            }

            // Recomendações
            if (currentEntropy > 80) {
                addLog("   ❌ RECOMENDAÇÃO: Tikkun urgente necessário!");
                playAlertFrequency(174, 1); // Frequência de dor/alívio
            } else if (currentEntropy > 60) {
                addLog("   ⚠️  RECOMENDAÇÃO: Considerar refatoração");
            } else {
                addLog("   ✅ RECOMENDAÇÃO: Sistema em harmonia");
            }
        }

        // ============================================================================
        // FUNÇÕES AUXILIARES
        // ============================================================================
        function updateDisplay() {
            // Atualizar medidor de entropia
            const entropyLevel = document.getElementById('entropy-level');
            entropyLevel.style.width = `${currentEntropy}%`;
            entropyLevel.style.backgroundColor =
                currentEntropy >= TIKKUN_THRESHOLD ? '#ff3366' :
                currentEntropy >= TIKKUN_THRESHOLD * 0.7 ? '#ffcc00' : '#33ccff';

            // Atualizar valor numérico
            document.getElementById('entropy-value').textContent = currentEntropy;
            document.getElementById('entropy-value').style.color =
                currentEntropy >= TIKKUN_THRESHOLD ? '#ff3366' : '#fff';

            // Atualizar limiar
            document.getElementById('tikkun-threshold').textContent = TIKKUN_THRESHOLD;
        }

        function addLog(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}<br>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function resizeCanvas() {
            waveformCanvas.width = waveformCanvas.parentElement.clientWidth;
            waveformCanvas.height = waveformCanvas.parentElement.clientHeight;

            if (currentOscillator) {
                const frequency = currentOscillator.frequency.value;
                visualizeWaveform(frequency);
            }
        }

        // ============================================================================
        // INTEGRAÇÃO COM SISTEMA EXTERNO (EXEMPLO)
        // ============================================================================
        // Para integrar com o sistema real, você pode usar:
        async function connectToQuantumFoam(ip = 'localhost', port = 8888) {
            try {
                const response = await fetch(`http://${ip}:${port}/api/stats`);
                const data = await response.json();

                // Converter coerência em entropia (quanto menor a coerência, maior a entropia)
                const coherence = data.current_coherence || 0.5;
                currentEntropy = Math.round((1 - coherence) * 100);

                // Verificar partículas reais
                const particles = data.real_particles || 0;
                if (particles < 10) {
                    currentEntropy += 20; // Penalidade por poucas partículas
                }

                updateDisplay();
                checkAlertThreshold();

                addLog(`🌌 Conectado à Espuma Quântica: Coerência ${(coherence*100).toFixed(1)}%`);

            } catch (error) {
                addLog(`❌ Erro ao conectar: ${error.message}`);
            }
        }

        // Conectar automaticamente se estiver no mesmo domínio
        if (window.location.hostname === 'localhost') {
            setTimeout(() => connectToQuantumFoam(), 1000);
        }

        // ============================================================================
        // EXPORTAÇÃO PARA USO EM OUTROS SISTEMAS
        // ============================================================================
        window.EntropyAlertSystem = {
            playFrequency: playAlertFrequency,
            silence: silenceAlert,
            initiateTikkun: initiateTikkun,
            getCurrentEntropy: () => currentEntropy,
            setEntropy: (value) => {
                currentEntropy = Math.min(100, Math.max(0, value));
                updateDisplay();
                checkAlertThreshold();
            },
            addLog: addLog
        };

        // Inicializar com valores realistas
        setTimeout(() => {
            currentEntropy = 65; // Entropia inicial moderada
            updateDisplay();
            checkAlertThreshold();
            addLog("✅ Sistema de Alertas de Desarmonia inicializado");
            addLog("   Use os botões para testar frequências e realizar Tikkuns");
        }, 500);
    </script>
</body>
</html>
